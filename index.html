<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Search & Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
    <header>
        <div class="config-group">
            <label>API Key</label>
            <div class="config-row">
                <input type="password" id="apiKey" style="flex: 1; min-width: 0;" placeholder="Gemini API Key">
                <button onclick="fetchModels()" style="flex-shrink: 0;">更新</button>
            </div>
        </div>
        <div class="config-group">
            <label>AI Model (RPD順)</label>
            <select id="modelSelect"></select>
        </div>
        <div class="config-group">
            <label>RPD設定</label>
            <div class="config-row">
                <input type="number" id="currentRpd" style="width: 70px;">
                <button onclick="updateCurrentModelRpd()">反映</button>
                <button onclick="openRpdModal()" style="background: #666;">JSON管理</button>
            </div>
        </div>
        <div class="config-group">
            <label>履歴操作</label>
            <div class="config-row">
                <button onclick="exportHistory()">保存</button>
                <button onclick="document.getElementById('importFile').click()">読込</button>
                <button onclick="runTests()" style="background:#666;">テスト実行</button>
            </div>
        </div>
    </header>

    <div id="chatBox"></div>

    <div class="input-area">
        <div id="previewContainer" class="preview-container"></div>
        <div class="text-input-wrapper">
            <button type="button" onclick="document.getElementById('fileInput').click()" class="icon-btn">📎</button>
            <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
            <textarea id="userInput" placeholder="Ctrl+Enterで送信..." onkeydown="handleKeyDown(event)" onpaste="handlePaste(event)"></textarea>
            <button id="sendBtn" onclick="sendMessage()">送信</button>
        </div>
    </div>

    <div id="rpdModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3>RPD設定 (JSON)</h3>
            <textarea id="rpdJsonArea" style="width: 100%; height: 200px; font-family: monospace;"></textarea>
            <div class="modal-buttons">
                <button onclick="saveRpdFromJson()">保存して反映</button>
                <button onclick="closeRpdModal()" style="background: #ccc; color: black;">キャンセル</button>
            </div>
        </div>
    </div>
</div>

<script src="main.js"></script>
<script src="chat.js"></script>
<script src="test.js"></script>
</body>
</html>
