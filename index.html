<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Search & Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
    <header>
        <div class="config-group">
            <label>AI Model / Options</label>
            <div class="config-row">
                <select id="modelSelect"></select>
                <label style="display:flex; align-items:center; cursor:pointer; font-size:12px;">
                    <input type="checkbox" id="useSearch"> Google検索
                </label>
            </div>
        </div>
        <div class="config-group">
            <label>Status & Config</label>
            <div class="config-row">
                <span id="usageStatus" style="font-size: 11px; color: #666;">済: 0</span>
                <button onclick="openAiConfigModal()" style="background: #1a73e8;">AI関連設定</button>
                <button onclick="exportHistory()">履歴保存</button>
            </div>
        </div>
    </header>

    <div id="chatBox"></div>

    <div class="input-area">
        <div id="previewContainer" class="preview-container"></div>
        <div class="text-input-wrapper">
            <button type="button" onclick="document.getElementById('fileInput').click()" class="icon-btn">📎</button>
            <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
            <textarea id="userInput" placeholder="Ctrl+Enterで送信..." onkeydown="handleKeyDown(event)" onpaste="handlePaste(event)"></textarea>
            <button id="sendBtn" onclick="sendMessage()">送信</button>
        </div>
    </div>

    <div id="aiConfigModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3>AI関連設定</h3>
            <div class="modal-body"> <div class="config-group">
                    <label>API Key</label>
                    <input type="password" id="apiKey" style="width:100%;">
                </div>
                
                <div class="config-group" style="background:#f9f9f9; padding:10px; border-radius:5px;">
                    <label>選択中モデルの個別設定</label>
                    <div class="config-row">
                        RPD: <input type="number" id="editRpd" style="width:80px;">
                        検索: <input type="checkbox" id="editSearch">
                        <button onclick="applyIndividualSetting()">反映</button>
                    </div>
                </div>

                <div class="config-group">
                    <label>一括管理 (JSON)</label>
                    <textarea id="rpdJsonArea"></textarea>
                </div>
            </div>
            <div class="modal-buttons">
                <button onclick="saveAiConfig()">保存して閉じる</button>
                <button onclick="closeAiConfigModal()" class="btn-secondary">キャンセル</button>
            </div>
        </div>
    </div>
</div>

<script src="main.js"></script>
<script src="chat.js"></script>
<script src="test.js"></script>
</body>
</html>
